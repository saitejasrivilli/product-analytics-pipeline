services:
  - type: web
    name: product-analytics-api
    env: python
    pythonVersion: 3.11
    buildCommand: pip install -r requirements-api.txt && echo "✅ FastAPI ready"
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT --reload
    envVars:
      - key: MOTHERDUCK_TOKEN
        sync: false
    skipBuildCache: true
