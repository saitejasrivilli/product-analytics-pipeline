version: 2

sources:
  - name: instacart
    schema: staging
    tables:
      - name: stg_orders
        description: Raw orders from Instacart dataset
        columns:
          - name: order_id
            description: Unique order identifier
            tests:
              - not_null
              - unique
          - name: user_id
            description: User identifier
            tests:
              - not_null
          - name: order_number
            description: Order sequence number for this user
          - name: order_dow
            description: Day of week (0=Monday, 6=Sunday)
          - name: order_hour_of_day
            description: Hour of day order was placed
          - name: days_since_prior_order
            description: Days since previous order (null if first order)

      - name: stg_products
        description: Raw products from Instacart dataset
        columns:
          - name: product_id
            description: Unique product identifier
            tests:
              - not_null
              - unique
          - name: product_name
            description: Product name
            tests:
              - not_null
          - name: aisle_id
            description: Aisle identifier
            tests:
              - not_null
          - name: department_id
            description: Department identifier
            tests:
              - not_null

      - name: stg_order_products
        description: Raw order-product bridge from Instacart dataset
        columns:
          - name: order_id
            description: Unique order identifier
            tests:
              - not_null
          - name: product_id
            description: Unique product identifier
            tests:
              - not_null
          - name: add_to_cart_order
            description: Sequence of item added to cart
            tests:
              - not_null
          - name: reordered
            description: 1 if product was previously ordered by user, 0 otherwise
            tests:
              - not_null

models:
  - name: stg_orders
    description: Cleaned and validated orders staging table
    columns:
      - name: order_id
        description: Unique order identifier
        tests:
          - not_null
          - unique

  - name: stg_products
    description: Cleaned and validated products staging table
    columns:
      - name: product_id
        description: Unique product identifier
        tests:
          - not_null
          - unique

  - name: stg_order_products
    description: Cleaned and validated order-product staging table
