version: 2

models:
  - name: fct_orders
    description: Fact table - one row per order-product combination
    columns:
      - name: order_id
        description: Unique order identifier
        tests:
          - not_null

      - name: user_id
        description: User identifier
        tests:
          - not_null

      - name: product_id
        description: Product identifier
        tests:
          - not_null

      - name: reordered
        description: 1 if product was previously ordered, 0 otherwise
        tests:
          - not_null

      - name: order_dow
        description: Day of week (0-6)

  - name: dim_users
    description: User dimension - segments, tenure, reorder rate
    columns:
      - name: user_id
        description: Unique user identifier
        tests:
          - not_null
          - unique

      - name: user_segment
        description: high_frequency, medium, or low_frequency
        tests:
          - not_null

      - name: reorder_rate
        description: Percentage of items previously ordered

  - name: dim_products
    description: Product dimension - product metadata and reorder stats
    columns:
      - name: product_id
        description: Unique product identifier
        tests:
          - not_null
          - unique

      - name: product_name
        description: Product name
        tests:
          - not_null

      - name: reorder_rate
        description: Percentage of times product was reordered
        tests:
          - not_null

  - name: product_funnel
    description: Daily funnel metrics - users, orders, items, reorder rates
    columns:
      - name: metric_date
        description: Date for metrics
        tests:
          - not_null
      - name: daily_users
        description: Count of distinct users who placed orders
        tests:
          - not_null
      - name: daily_orders
        description: Count of orders placed
        tests:
          - not_null
      - name: reorder_rate
        description: Percentage of items reordered
        tests:
          - not_null

  - name: user_retention
    description: User retention metrics by cohort
    columns:
      - name: user_id
        description: User identifier
        tests:
          - not_null
          - unique
      - name: total_orders
        description: Total orders by user
        tests:
          - not_null
      - name: user_cohort
        description: User cohort classification
        tests:
          - not_null

  - name: department_performance
    description: Department-level metrics and rankings
    columns:
      - name: department_id
        description: Department identifier
        tests:
          - not_null
          - unique
      - name: reorder_rate
        description: Department reorder rate
      - name: performance_tier
        description: Performance classification
